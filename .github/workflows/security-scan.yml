name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'src/webview/package.json'
      - 'src/webview/package-lock.json'
  schedule:
    # 毎週月曜日 12:00 JST (03:00 UTC) に実行
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  snyk-security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    # DependabotのPRではSNYK_TOKENシークレットにアクセスできないためスキップ
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: |
          cd src/webview
          npm ci

      # ルートプロジェクトのスキャン
      - name: Run Snyk to check root project
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=package.json --project-name=cc-wf-studio-root

      # Webviewプロジェクトのスキャン
      - name: Run Snyk to check webview project
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=src/webview/package.json --project-name=cc-wf-studio-webview

      # SARIF形式でのスキャン（GitHub Code Scanning用 - プロジェクトごとに分割）
      - name: Generate SARIF for root project
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --file=package.json --sarif-file-output=snyk-root.sarif

      - name: Generate SARIF for webview project
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --file=src/webview/package.json --sarif-file-output=snyk-webview.sarif

      # すべてのプロジェクトのモニタリング（継続的な監視）
      - name: Monitor all projects with Snyk
        uses: snyk/actions/node@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects

      # GitHub Code Scanningへのアップロード（プロジェクトごとに分割）
      - name: Upload root project results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-root.sarif
          category: snyk-root

      - name: Upload webview project results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-webview.sarif
          category: snyk-webview
